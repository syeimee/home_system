:concurrency: 3
:queues:
  - default
  - webhooks

:scheduler:
  :schedule:
    met_art_refresh:
      every: '15m'
      class: MetArtRefreshJob
      queue: default
    interview_alert_check:
      every: '15m'
      class: InterviewAlertCheckJob
      queue: default
    google_calendar_line_notify:
      every: '5m'
      class: GoogleCalendarLineNotifyJob
      queue: webhooks
