<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f5f2ee"/>

  <!-- Outer border -->
  <rect x="28" y="28" width="344" height="344" fill="none" stroke="#1a1714" stroke-width="0.8" opacity="0.4"/>
  <rect x="20" y="20" width="360" height="360" fill="none" stroke="#1a1714" stroke-width="0.3" opacity="0.2"/>

  <!-- Roof -->
  <polyline points="200,88 296,164 104,164" fill="none" stroke="#1a1714" stroke-width="1.2" stroke-linejoin="miter"/>

  <!-- Walls -->
  <line x1="116" y1="164" x2="116" y2="256" stroke="#1a1714" stroke-width="1.2"/>
  <line x1="284" y1="164" x2="284" y2="256" stroke="#1a1714" stroke-width="1.2"/>

  <!-- Floor -->
  <line x1="116" y1="256" x2="284" y2="256" stroke="#1a1714" stroke-width="1.2"/>

  <!-- Door -->
  <rect x="183" y="207" width="34" height="49" fill="none" stroke="#1a1714" stroke-width="0.9"/>
  <circle cx="211" cy="233" r="2" fill="#1a1714"/>

  <!-- Left window -->
  <rect x="134" y="184" width="30" height="28" fill="none" stroke="#1a1714" stroke-width="0.9"/>
  <line x1="149" y1="184" x2="149" y2="212" stroke="#1a1714" stroke-width="0.5" opacity="0.45"/>
  <line x1="134" y1="198" x2="164" y2="198" stroke="#1a1714" stroke-width="0.5" opacity="0.45"/>

  <!-- Right window -->
  <rect x="236" y="184" width="30" height="28" fill="none" stroke="#1a1714" stroke-width="0.9"/>
  <line x1="251" y1="184" x2="251" y2="212" stroke="#1a1714" stroke-width="0.5" opacity="0.45"/>
  <line x1="236" y1="198" x2="266" y2="198" stroke="#1a1714" stroke-width="0.5" opacity="0.45"/>

  <!-- Ground shadow line -->
  <line x1="76" y1="256" x2="324" y2="256" stroke="#1a1714" stroke-width="0.4" opacity="0.2"/>

  <!-- Divider -->
  <line x1="100" y1="298" x2="300" y2="298" stroke="#1a1714" stroke-width="0.5" opacity="0.3"/>

  <!-- HOME text -->
  <text x="200" y="322"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="300"
    font-size="18"
    fill="#1a1714"
    letter-spacing="10">HOME</text>

  <!-- SYSTEM text -->
  <text x="200" y="344"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="8"
    fill="#1a1714"
    opacity="0.5"
    letter-spacing="6">SYSTEM</text>
</svg>
