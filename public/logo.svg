<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="none"/>

  <!-- Roof -->
  <polyline points="200,88 296,164 104,164" fill="none" stroke="#ffffff" stroke-width="6" stroke-linejoin="miter"/>

  <!-- Walls -->
  <line x1="116" y1="164" x2="116" y2="256" stroke="#ffffff" stroke-width="6"/>
  <line x1="284" y1="164" x2="284" y2="256" stroke="#ffffff" stroke-width="6"/>

  <!-- Floor -->
  <line x1="116" y1="256" x2="284" y2="256" stroke="#ffffff" stroke-width="6"/>

  <!-- Door -->
  <rect x="183" y="207" width="34" height="49" fill="none" stroke="#ffffff" stroke-width="4"/>
  <circle cx="211" cy="233" r="3.5" fill="#ffffff"/>

  <!-- Left window -->
  <rect x="134" y="184" width="30" height="28" fill="none" stroke="#ffffff" stroke-width="4"/>
  <line x1="149" y1="184" x2="149" y2="212" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
  <line x1="134" y1="198" x2="164" y2="198" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>

  <!-- Right window -->
  <rect x="236" y="184" width="30" height="28" fill="none" stroke="#ffffff" stroke-width="4"/>
  <line x1="251" y1="184" x2="251" y2="212" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>
  <line x1="236" y1="198" x2="266" y2="198" stroke="#ffffff" stroke-width="2.5" opacity="0.6"/>

  <!-- HOME text -->
  <text x="200" y="322"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="400"
    font-size="24"
    fill="#ffffff"
    letter-spacing="10">HOME</text>

  <!-- SYSTEM text -->
  <text x="200" y="348"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="11"
    fill="#ffffff"
    opacity="0.6"
    letter-spacing="6">SYSTEM</text>
</svg>
