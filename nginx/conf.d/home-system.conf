upstream rails_app {
    server rails:3000;
}

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/example.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    error_page 502 /502.html;
    location = /502.html {
        default_type text/html;
        return 502 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="3"><style>body{background:#000;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh}p{font-size:14px;color:#888}</style></head><body><p>Starting...</p></body></html>';
    }

    location / {
        proxy_pass http://rails_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
