services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  rails:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ruby", "-e", "require 'net/http'; Net::HTTP.get(URI('http://localhost:3000/login'))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    expose:
      - "3000"

  sidekiq:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    command: bundle exec sidekiq -C config/sidekiq.yml

  alexa:
    build: ./alexa
    restart: unless-stopped
    environment:
      ALEXA_PORT: "3100"
      ALEXA_PROXY_PORT: "3101"
      AMAZON_HOST: "alexa.amazon.co.jp"
    ports:
      - "3101:3101"
    volumes:
      - alexa_data:/data
    expose:
      - "3100"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      rails:
        condition: service_healthy

volumes:
  redis_data:
  alexa_data:
